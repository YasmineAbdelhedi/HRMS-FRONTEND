<div class="login-container">
  <!-- Left Side - Branding -->
  <div class="left-side">
    <div class="brand-content">
      <h1>Welcome Back!</h1>
      <p>Streamline your HR management with our powerful platform.</p>
    </div>
  </div>

  <!-- Right Side - Login Form -->
  <div class="right-side">
    <div class="login-box">
      <div class="logo-area">
        <a [routerLink]="['/dashboard']">
          <img src="./assets/images/logos/logo.svg" alt="logo" />
        </a>
      </div>

      <h2>Sign In</h2>
      <p class="sub-text">Enter your email and password to access your account</p>

      <div class="row m-b-24">
        <div class="col-6">
          <button mat-stroked-button class="w-100 social-btn">
            <div class="d-flex align-items-center justify-content-center">
              <img src="/assets/images/svgs/google-icon.svg" alt="google" width="16" class="m-r-8" />
              <span>Google</span>
            </div>
          </button>
        </div>
        <div class="col-6">
          <button mat-stroked-button class="w-100 social-btn">
            <div class="d-flex align-items-center justify-content-center">
              <img src="/assets/images/svgs/facebook-icon.svg" alt="facebook" width="20" class="m-r-8" />
              <span>Facebook</span>
            </div>
          </button>
        </div>
      </div>

      <div class="divider">
        <span>or sign in with email</span>
      </div>

      <form [formGroup]="loginform" (ngSubmit)="submit()">
        <mat-label class="mat-subtitle-2 f-s-14 f-w-600 m-b-12 d-block">Email Address</mat-label>
        <mat-form-field appearance="outline" class="w-100" color="primary">
          <input matInput type="email" formControlName="email" placeholder="name@example.com" />
        </mat-form-field>

        <div class="d-flex align-items-center justify-content-between m-b-12">
          <mat-label class="mat-subtitle-2 f-s-14 f-w-600">Password</mat-label>
          <a [routerLink]="['/']" class="text-primary f-w-600 text-decoration-none f-s-14">
            Forgot Password?
          </a>
        </div>
        <mat-form-field appearance="outline" class="w-100" color="primary">
          <input matInput type="password" formControlName="password" placeholder="••••••••" />
        </mat-form-field>

        <button mat-flat-button color="primary" class="w-100 m-t-16 py-24 f-s-16" type="submit"
          [disabled]="loginform.invalid">
          Sign In
        </button>
      </form>

      <div class="text-center m-t-24">
        <span class="f-w-500">
          Don't have an account?
          <a [routerLink]="['/authentication/register']" class="text-decoration-none text-primary f-w-600">
            Create account
          </a>
        </span>
      </div>
    </div>
  </div>
</div>
