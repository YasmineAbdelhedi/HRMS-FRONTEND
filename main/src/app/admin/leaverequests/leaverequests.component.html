<mat-card class="cardWithShadow">
  <mat-card-content>
    <div class="leave-requests-header">
      <div>
        <mat-card-title>Leave Requests</mat-card-title>
        <mat-card-subtitle class="mat-body-1">All leave requests</mat-card-subtitle>
      </div>
      <div class="actions">
        <mat-form-field appearance="outline">
          <mat-label>Filter</mat-label>
          <input matInput (input)="applyFilter($event)" placeholder="Search leave requests" />
        </mat-form-field>
      </div>
    </div>

    <div class="table-container">
      <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8 full-table">

        <ng-container matColumnDef="employee">
          <th mat-header-cell *matHeaderCellDef> Employee </th>
          <td mat-cell *matCellDef="let r"> {{ r.employee?.fullName || '-' }} </td>
        </ng-container>

        <ng-container matColumnDef="leaveType">
          <th mat-header-cell *matHeaderCellDef> Type </th>
          <td mat-cell *matCellDef="let r"> {{ r.leaveType }} </td>
        </ng-container>

        <ng-container matColumnDef="startDate">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> Start </th>
          <td mat-cell *matCellDef="let r"> {{ r.startDate | date:'shortDate' }} </td>
        </ng-container>

        <ng-container matColumnDef="endDate">
          <th mat-header-cell *matHeaderCellDef mat-sort-header> End </th>
          <td mat-cell *matCellDef="let r"> {{ r.endDate | date:'shortDate' }} </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef> Status </th>
          <td mat-cell *matCellDef="let r">
            <span class="status-badge" [ngClass]="{
              'pending': r.status === 'PENDING',
              'approved': r.status === 'APPROVED',
              'rejected': r.status === 'REJECTED'
            }">
              {{ r.status }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Actions </th>
          <td mat-cell *matCellDef="let r">
            <button mat-icon-button color="primary" *ngIf="r.status === 'PENDING'" (click)="approve(r)" title="Approve">
              <mat-icon>check_circle</mat-icon>
            </button>
            <button mat-icon-button color="warn" *ngIf="r.status === 'PENDING'" (click)="reject(r)" title="Reject">
              <mat-icon>cancel</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator [pageSizeOptions]="[5,10,25]" showFirstLastButtons></mat-paginator>
    </div>
  </mat-card-content>
</mat-card>
