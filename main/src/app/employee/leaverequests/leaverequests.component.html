<mat-card class="cardWithShadow">
  <mat-card-content>
    <mat-card-title>Create Leave Request</mat-card-title>
    <mat-card-subtitle class="mat-body-1">Submit your leave request</mat-card-subtitle>

    <form [formGroup]="leaveForm" class="row">
      <div class="col-lg-4 col-sm-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Leave Type</mat-label>
          <input matInput formControlName="leaveType" placeholder="e.g. Annual, Sick" />
        </mat-form-field>
      </div>

      <div class="col-lg-3 col-sm-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Start Date</mat-label>
          <input matInput type="date" formControlName="startDate" />
        </mat-form-field>
      </div>

      <div class="col-lg-3 col-sm-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>End Date</mat-label>
          <input matInput type="date" formControlName="endDate" />
        </mat-form-field>
      </div>

      <div class="col-lg-2 col-sm-6 d-flex align-items-center">
        <button mat-flat-button color="primary" [disabled]="leaveForm.invalid" (click)="createLeaveRequest()">
          Submit
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>

<mat-card class="cardWithShadow">
  <mat-card-content>
    <div class="d-flex align-items-center justify-content-between">
      <div>
        <mat-card-title>My Leave Requests</mat-card-title>
        <mat-card-subtitle class="mat-body-1">Track your request status</mat-card-subtitle>
      </div>
      <mat-form-field appearance="outline">
        <mat-label>Filter</mat-label>
        <input matInput (input)="applyFilter($event)">
      </mat-form-field>
    </div>

    <div class="table-container">
      <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8 full-table">
        <ng-container matColumnDef="leaveType">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Leave Type</th>
          <td mat-cell *matCellDef="let request">{{ request.leaveType }}</td>
        </ng-container>

        <ng-container matColumnDef="startDate">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Start Date</th>
          <td mat-cell *matCellDef="let request">{{ request.startDate }}</td>
        </ng-container>

        <ng-container matColumnDef="endDate">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>End Date</th>
          <td mat-cell *matCellDef="let request">{{ request.endDate }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Status</th>
          <td mat-cell *matCellDef="let request">{{ request.status }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>

      <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
    </div>
  </mat-card-content>
</mat-card>
