<mat-card class="cardWithShadow">
  <mat-card-content>
    <div class="header-row">
      <div>
        <mat-card-title>Projects (as Manager)</mat-card-title>
        <mat-card-subtitle>Projects you manage</mat-card-subtitle>
      </div>
      <div class="actions">
        <mat-form-field appearance="outline"><mat-label>Filter</mat-label><input matInput (input)="applyFilter($event)" placeholder="Search projects"/></mat-form-field>
        <button mat-flat-button color="primary" (click)="openCreate()">Create</button>
      </div>
    </div>

    <div class="table-container">
      <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8 full-table">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
          <td mat-cell *matCellDef="let p">{{p.name}}</td>
        </ng-container>
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let p">{{p.description}}</td>
        </ng-container>
        <ng-container matColumnDef="projectManager">
          <th mat-header-cell *matHeaderCellDef>Manager</th>
          <td mat-cell *matCellDef="let p">{{p.projectManagerName || '-'}}</td>
        </ng-container>
        <ng-container matColumnDef="budget">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Budget</th>
          <td mat-cell *matCellDef="let p">{{p.budget}}</td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let p">
            <button mat-icon-button color="primary" (click)="openEdit(p)"><mat-icon>edit</mat-icon></button>
            <button mat-icon-button color="accent" (click)="openAssign(p)"><mat-icon>group_add</mat-icon></button>
            <button mat-icon-button color="warn" (click)="deleteProject(p)"><mat-icon>delete</mat-icon></button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator [pageSizeOptions]="[5,10,25]" showFirstLastButtons></mat-paginator>
    </div>
  </mat-card-content>
</mat-card>
