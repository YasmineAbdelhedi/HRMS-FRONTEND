<mat-card class="cardWithShadow">
  <mat-card-content>
    <mat-card-title>Attendance</mat-card-title>
    <mat-card-subtitle class="mat-body-1">View all attendance and filter by employee/date range</mat-card-subtitle>

    <div class="row">
      <div class="col-lg-3 col-sm-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Employee</mat-label>
          <mat-select [formControl]="filterForm.controls.employeeId">
            <mat-option *ngFor="let employee of employees" [value]="employee.id">{{ employee.fullName }}</mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <div class="col-lg-3 col-sm-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Start Date</mat-label>
          <input matInput type="date" [formControl]="filterForm.controls.startDate" />
        </mat-form-field>
      </div>

      <div class="col-lg-3 col-sm-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>End Date</mat-label>
          <input matInput type="date" [formControl]="filterForm.controls.endDate" />
        </mat-form-field>
      </div>

      <div class="col-lg-3 col-sm-6 d-flex align-items-center gap-8">
        <button mat-flat-button color="primary" (click)="applyRangeFilter()">Apply</button>
        <button mat-stroked-button color="primary" (click)="resetFilter()">Reset</button>
      </div>
    </div>

    <div class="d-flex justify-content-end m-b-12">
      <mat-form-field appearance="outline">
        <mat-label>Search</mat-label>
        <input matInput (input)="applyFilter($event)" placeholder="Type to filter" />
      </mat-form-field>
    </div>

    <div class="table-container">
      <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8 full-table">
        <ng-container matColumnDef="employee">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Employee</th>
          <td mat-cell *matCellDef="let row">{{ row.employee.fullName }}</td>
        </ng-container>

        <ng-container matColumnDef="checkInTime">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Check In</th>
          <td mat-cell *matCellDef="let row">{{ row.checkInTime | date:'short' }}</td>
        </ng-container>

        <ng-container matColumnDef="checkOutTime">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Check Out</th>
          <td mat-cell *matCellDef="let row">{{ row.checkOutTime ? (row.checkOutTime | date:'short') : '-' }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>

      <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons></mat-paginator>
    </div>
  </mat-card-content>
</mat-card>
